<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Mind Collaborative Website</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-grid"></div>
    <main class="hero-container">
        <h1 class="title">Welcome to <span class="highlight">Merge Mind</span></h1>
        <p class="subtitle">A collaborative web project between two developers.</p>
        
        <div class="status-card">
            <h2>Current Status</h2>
            <div class="ping-indicator">
                <span class="ping-dot"></span>
                <p>Website Initialized Successfully!</p>
            </div>
            <p class="instruction-text">Next: Your friend needs to add a feature to this page.</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
